name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: "Choose the target environment:"
        required: true
        default: 'production'
        type: choice
        options:
          - test
          - production
    
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Create cert files from secrets
        run: |
          mkdir -p ./frontend/certs
          echo "${{ secrets.LASTCALLSW_COM_CHAINED_CRT }}" > ./frontend/certs/lastcallsw_com.chained.crt
          echo "${{ secrets.LASTCALLSW_COM_KEY }}" > ./frontend/certs/lastcallsw_com.key
          chmod 600 ./frontend/certs/lastcallsw_com.key

      - name: Verify cert files exist
        run: ls -la ./frontend/certs/

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_BASE_URL=${{ vars.BACKEND_BASE_URL}}
            VITE_PORTFOLIO_URL=${{ vars.PORTFOLIO_URL}}
          tags: lastcallsoftware/trackeats-frontend:latest,lastcallsoftware/trackeats-frontend:${{ github.sha }}
          cache-from: type=registry,ref=lastcallsoftware/trackeats-frontend:buildcache
          cache-to: type=registry,ref=lastcallsoftware/trackeats-frontend:buildcache,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend-python
          file: ./backend-python/Dockerfile
          push: true
          tags: lastcallsoftware/trackeats-backend:latest,lastcallsoftware/trackeats-backend:${{ github.sha }}
          cache-from: type=registry,ref=lastcallsoftware/trackeats-backend:buildcache
          cache-to: type=registry,ref=lastcallsoftware/trackeats-backend:buildcache,mode=max

      - name: Deploy to Trackeats server via SSH
        uses: appleboy/ssh-action@master
        env:
          BACKEND_ENCRYPTION_KEY_B64: ${{ secrets.BACKEND_ENCRYPTION_KEY_B64 }}
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ${{ secrets.APP_SERVER_USERNAME }}
          key: ${{ secrets.APP_SERVER_SSH_KEY }}
          envs: >-
            BACKEND_ENCRYPTION_KEY_B64, 
            DB_HOSTNAME,
            DB_NAME,
            DB_USER,
            DB_PASSWORD,
            SMTP_HOSTNAME,
            SMTP_USERNAME,
            SMTP_PASSWORD
          script: |
            cd ~/trackeats
            bash deploy.sh
