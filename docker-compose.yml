services:
  frontend:
    container_name: trackeats-frontend
    image: lastcallsoftware/trackeats-frontend:latest
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:8443"
      - "5443:5443"
    environment:
      - NODE_ENV=production
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    container_name: trackeats-backend
    image: lastcallsoftware/trackeats-backend:latest
    pull_policy: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      # This maps environment variables that will be visible to the app inside the Docker
      # container (the left side of the :) to values (the right side).
      # You may specify literals and/or environment variables taken from the system at 
      # the time the build runs.  These environment variables may be pulled from an .env 
      # file (typical when the app runs locally), or injected into the environment by GitHub 
      # Secrets or some other secrets manager (typical when the app runs on an app server).
      # Injected values take preference over .env values, BTW.
      # The :? after an env variable name specifies that the value is required.  Docker 
      # compose will throw an error if that value is not present in the environment.  Docker
      # Compose provides a decent error message ("XXX is missing a value"), but you may 
      # provide an additional error message after the ? if you wish.
      # A :- after an env variable name specifies a default value if the value is missing
      # from the environment.  Put it right after the :-
      FLASK_ENV: production
      DB_HOSTNAME: db
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-trackeats}
      DB_APP_USERNAME: ${DB_APP_USERNAME:?}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:?}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:?}
      PORTFOLIO_URL: ${PORTFOLIO_URL:?}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?}
      APP_TEST_PASSWORD: ${APP_TEST_PASSWORD:?}
      APP_GUEST_PASSWORD: ${APP_GUEST_PASSWORD:?}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME:?}
      SMTP_USERNAME: ${SMTP_USERNAME:?}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?}
      BACKEND_ENCRYPTION_KEY_B64: ${BACKEND_ENCRYPTION_KEY_B64:?}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?}
      ACCESS_TOKEN_DURATION: ${ACCESS_TOKEN_DURATION:-120}
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: lastcallsoftware/trackeats-backend:latest
    command: flask db upgrade
    depends_on:
      db:
        condition: service_healthy
    environment:
      - name=value

  db:
    container_name: trackeats-db
    image: mysql:8
    pull_policy: if_not_present
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is missing}
      MYSQL_DATABASE: ${DB_DATABASE_NAME:?DB_DATABASE_NAME is missing}
      MYSQL_USER: ${DB_APP_USERNAME:?DB_APP_USERNAME is missing}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:?DB_APP_PASSWORD is missing}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
    name: trackeats-db-data

networks:
  default:
    name: trackeats-net
