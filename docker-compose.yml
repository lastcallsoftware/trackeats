services:
  frontend:
    container_name: trackeats-frontend
    image: lastcallsoftware/trackeats-frontend:latest
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:8443"
      - "5443:5443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    container_name: trackeats-backend
    image: lastcallsoftware/trackeats-backend:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      ENV: PROD
      DB_HOSTNAME: db
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      BACKEND_ENCRYPTION_KEY_B64: ${BACKEND_ENCRYPTION_KEY_B64}
      BACKEND_ENCRYPTION_KEY: /run/secrets/trackeats-backend-encryption.key
    tmpfs:
      - /run/secrets
    command:
      - /bin/sh
      - -c
      - |
        umask 077
        mkdir -p /run/secrets
        echo "$$BACKEND_ENCRYPTION_KEY_B64" | base64 -d > "$$BACKEND_ENCRYPTION_KEY"
        unset BACKEND_ENCRYPTION_KEY_B64
        exec python src/app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    container_name: trackeats-db
    image: mysql:8
    pull_policy: if_not_present
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
    name: trackeats-db-data

networks:
  default:
    name: trackeats-net
