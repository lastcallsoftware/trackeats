services:
  frontend:
    container_name: trackeats-frontend
    image: lastcallsoftware/trackeats-frontend:latest
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:8443"
      - "5443:5443"
    environment:
      - NODE_ENV=production
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    container_name: trackeats-backend
    image: lastcallsoftware/trackeats-backend:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      DB_HOSTNAME: db
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:?DB_DATABASE_NAME is missing}
      DB_APP_USERNAME: ${DB_APP_USERNAME:?DB_APP_USERNAME is missing}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:?DB_APP_PASSWORD is missing}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:?DB_ADMIN_PASSWORD is missing}
      DB_TEST_PASSWORD: ${DB_TEST_PASSWORD:?DB_TEST_PASSWORD is missing}
      DB_GUEST_PASSWORD: ${DB_GUEST_PASSWORD:?DB_GUEST_PASSWORD is missing}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME:?SMTP_HOSTNAME is missing}
      SMTP_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME is missing}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is missing}
      BACKEND_ENCRYPTION_KEY_B64: ${BACKEND_ENCRYPTION_KEY_B64:?BACKEND_ENCRYPTION_KEY_B64 is missing}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is missing}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:?BACKEND_BASE_URL is missing}
      PORTFOLIO_URL: ${PORTFOLIO_URL:?PORTFOLIO_URL is missing}
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    container_name: trackeats-db
    image: mysql:8
    pull_policy: if_not_present
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is missing}
      MYSQL_DATABASE: ${DB_DATABASE_NAME:?DB_DATABASE_NAME is missing}
      MYSQL_USER: ${DB_APP_USERNAME:?DB_APP_USERNAME is missing}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:?DB_APP_PASSWORD is missing}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
    name: trackeats-db-data

networks:
  default:
    name: trackeats-net
