# PORT NUMBERS > 1000
# Linux and WSL don't allow apps run by non-root users to bind to port numbers below 1000.
# We *could* run as root and use lower port numbers, but it's easier and more practical to 
# just have Docker remap incoming requests to port numbers above 1000 and bind to those ports.
# You'll see this port remapping in the docker-compose.yml.

# LOCAL DEVELOPMENT
# Serve the TrackEats app directly when accessed via localhost or 127.0.0.1 (no SSL needed).
# Also acts as the default_server catch-all so that unrecognised hostnames never fall through
# to the personal-website redirect block below.
server {
    listen 8080 default_server;
    server_name localhost 127.0.0.1 _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# PERSONAL HOME PAGE
# Redirect HTTP and HTTPS requests to "pwholmes.com" and "www.pwholmes.com" to HTTPS "pwholmes.lastcallsw.com".
server {
    listen 80;
    listen 8080;

    server_name pwholmes.com www.pwholmes.com;

    return 301 https://pwholmes.lastcallsw.com;
}
# Listen for HTTPS requests to "pwholmes.lastcallsw.com".
 server {
    listen 443 ssl;
    listen 8443 ssl;

    server_name pwholmes.lastcallsw.com;

    ssl_certificate /etc/ssl/certs/lastcallsw_com.chained.crt;
    ssl_certificate_key /etc/ssl/certs/lastcallsw_com.key;

    #root /usr/share/nginx/html;
    root /usr/share/nginx/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
 }

# LAST CALL SOFTWARE HOME PAGE
# Redirect HTTP requests to "lastcallsw.com" and "www.lastcallsw.com" to HTTPS "www.lastcallsw.com".
server {
    listen 80;
    listen 8080;

    server_name lastcallsw.com www.lastcallsw.com;

    return 301 https://www.lastcallsw.com;
}
# Listen for HTTPS requests to "lastcallsw.com" and "www.lastcallsw.com".
server {
    listen 443 ssl;
    listen 8443 ssl;

    server_name lastcallsw.com www.lastcallsw.com;

    ssl_certificate /etc/ssl/certs/lastcallsw_com.chained.crt;
